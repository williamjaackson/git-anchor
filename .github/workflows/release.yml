name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    # macos-latest is the only runner with `codesign`, which Bun-compiled
    # Darwin binaries need to run. Bun cross-compiles to every other target
    # from macOS, so one job handles all five binaries.
    runs-on: macos-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync package.json version to release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "package.json version set to ${VERSION}"

      - name: Build all targets
        run: |
          set -e
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64; do
            echo "::group::build ${target}"
            bash build.sh "${target}"
            echo "::endgroup::"
          done
          ls -lh dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
